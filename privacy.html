<!DOCTYPE html>

        setTimeout(() => {
            document.getElementById('breadcrumbs').innerHTML = HJKComponents.renderBreadcrumbs([
                { label: 'Home', url: 'index.html' },
                { label: 'Privacy Policy' }
            ]);

            document.getElementById('pageContent').innerHTML = `

                    <h1 class="font-heading mb-4" style="font-size:2rem;color:var(--primary)">Privacy Policy</h1>
                    <p class="text-muted mb-4" style="font-size:0.88rem">Last updated: January 15, 2026</p>

                    <div class="cms-content" style="line-height:1.8;font-size:0.95rem">
                        <p>At HJKCollections, we are committed to protecting your privacy. This Privacy Policy explains how we collect, use, and safeguard your personal information.</p>

                        <h5 class="font-heading mt-4 mb-2">1. Information We Collect</h5>
                        <p>We collect the following types of information:</p>
                        <ul>
                            <li><strong>Personal Information:</strong> Name, email address, phone number, shipping address, and billing information when you create an account or place an order.</li>
                            <li><strong>Payment Information:</strong> Payment details are processed securely through Razorpay. We do not store your credit/debit card information on our servers.</li>
                            <li><strong>Usage Data:</strong> Browser type, IP address, pages visited, and time spent on our website for analytics purposes.</li>
                        </ul>

                        <h5 class="font-heading mt-4 mb-2">2. How We Use Your Information</h5>
                        <ul>
                            <li>To process and fulfill your orders</li>
                            <li>To communicate order updates and delivery status</li>
                            <li>To respond to your inquiries and provide customer support</li>
                            <li>To send promotional offers and newsletters (with your consent)</li>
                            <li>To improve our website and services</li>
                            <li>To prevent fraud and ensure security</li>
                        </ul>

                        <h5 class="font-heading mt-4 mb-2">3. Information Sharing</h5>
                        <p>We do not sell, trade, or rent your personal information to third parties. We may share your information with:</p>
                        <ul>
                            <li>Shipping partners for order delivery</li>
                            <li>Payment processors (Razorpay) for transaction processing</li>
                            <li>Legal authorities when required by law</li>
                        </ul>

                        <h5 class="font-heading mt-4 mb-2">4. Data Security</h5>
                        <p>We implement appropriate security measures to protect your personal information against unauthorized access, alteration, disclosure, or destruction. All data transmission is encrypted using SSL technology.</p>

                        <h5 class="font-heading mt-4 mb-2">5. Cookies</h5>
                        <p>We use cookies and local storage to enhance your browsing experience. Cookies help us remember your preferences, keep items in your cart, and analyze website traffic.</p>

                        <h5 class="font-heading mt-4 mb-2">6. Your Rights</h5>
                        <p>You have the right to:</p>
                        <ul>
                            <li>Access and review your personal information</li>
                            <li>Update or correct your account details</li>
                            <li>Request deletion of your account</li>
                            <li>Opt out of promotional communications</li>
                        </ul>

                        <h5 class="font-heading mt-4 mb-2">7. Children's Privacy</h5>
                        <p>Our website is not intended for children under 18 years of age. We do not knowingly collect personal information from children.</p>

                        <h5 class="font-heading mt-4 mb-2">8. Changes to This Policy</h5>
                        <p>We may update this Privacy Policy from time to time. Any changes will be posted on this page with an updated revision date.</p>

                        <h5 class="font-heading mt-4 mb-2">9. Contact Us</h5>
                        <p>If you have any questions about this Privacy Policy, please contact us at <a href="contact.html" style="color:var(--secondary)">our contact page</a> or email us at privacy@hjkcollections.com.</p>
                    </div>
                </div>`;
