<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HJKCollections</title>

    <!-- Bootstrap 5.3 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/customer.css" rel="stylesheet">
    <link href="assets/css/responsive.css">
</head>
<body>

    <div class="auth-page">
        <div class="auth-card">
            <!-- Brand Logo -->
            <div class="auth-logo">
                <h2><span class="brand-hjk">HJK</span><span class="brand-collections">Collections</span></h2>
            </div>

            <!-- Title -->
            <div class="auth-title">
                <h3>Welcome Back</h3>
                <p>Sign in to your account to continue</p>
            </div>

            <!-- Login Form -->
            <form onsubmit="HJKAuth.handleLogin(event)">
                <!-- Email -->
                <div class="form-group">
                    <label class="form-label-custom" for="loginEmail">Email Address</label>
                    <div class="input-group-custom">
                        <span class="input-icon"><i class="fa-regular fa-envelope"></i></span>
                        <input type="email" id="loginEmail" class="form-control-custom" placeholder="Enter your email" required>
                    </div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label class="form-label-custom" for="loginPassword">Password</label>
                    <div class="input-group-custom">
                        <span class="input-icon"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" id="loginPassword" class="form-control-custom" placeholder="Enter your password" required>
                        <button type="button" class="toggle-password" onclick="HJKAuth.togglePassword('loginPassword')">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="d-flex align-items-center justify-content-between mb-4">
                    <div class="form-check-custom">
                        <input type="checkbox" id="rememberMe">
                        <label for="rememberMe" style="font-size: 0.88rem; cursor: pointer;">Remember me</label>
                    </div>
                    <a href="forgot-password.html" style="font-size: 0.88rem; font-weight: 500;">Forgot Password?</a>
                </div>

                <!-- Login Button -->
                <button type="submit" class="btn-secondary-custom w-100 justify-content-center" style="padding: 14px;">
                    <i class="fa-solid fa-right-to-bracket"></i> Login
                </button>
            </form>

            <!-- Divider -->
            <div class="divider-text my-4">or</div>

            <!-- Google Login -->
            <button type="button" class="btn-outline-custom w-100 justify-content-center" style="padding: 14px;" onclick="HJKComponents.showToast('Google login is not available in demo mode', 'info')">
                <i class="fa-brands fa-google" style="color: #DB4437;"></i> Continue with Google
            </button>

            <!-- Footer -->
            <div class="auth-footer">
                Don't have an account? <a href="register.html">Register</a>
            </div>

            <!-- Demo Credentials -->
            <div style="margin-top: 20px; padding: 14px; background: var(--accent-light); border-radius: var(--radius-sm); border: 1px dashed var(--secondary-light);">
                <p style="font-size: 0.8rem; font-weight: 600; color: var(--secondary-dark); margin-bottom: 6px;">
                    <i class="fa-solid fa-circle-info"></i> Demo Credentials
                </p>
                <p style="font-size: 0.8rem; margin: 0; color: var(--text-muted);">
                    Email: <strong>rahul@example.com</strong><br>
                    Password: <strong>password123</strong>
                </p>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Bootstrap 5.3 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="assets/js/api.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/components.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/auth.js"></script>
</body>
</html>
