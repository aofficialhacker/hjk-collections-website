<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - HJKCollections</title>

    <!-- Bootstrap 5.3 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/customer.css" rel="stylesheet">
    <link href="assets/css/responsive.css">
</head>
<body>

    <div class="auth-page">
        <div class="auth-card">
            <!-- Brand Logo -->
            <div class="auth-logo">
                <h2><span class="brand-hjk">HJK</span><span class="brand-collections">Collections</span></h2>
            </div>

            <!-- Step 1: Forgot Password Form -->
            <div id="forgotForm">
                <div class="auth-title">
                    <div style="width: 70px; height: 70px; border-radius: 50%; background: var(--accent-light); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
                        <i class="fa-solid fa-key" style="font-size: 1.6rem; color: var(--secondary);"></i>
                    </div>
                    <h3>Forgot Password?</h3>
                    <p>Enter your email address and we'll send you a link to reset your password.</p>
                </div>

                <form onsubmit="HJKAuth.handleForgotPassword(event)">
                    <!-- Email -->
                    <div class="form-group">
                        <label class="form-label-custom" for="forgotEmail">Email Address</label>
                        <div class="input-group-custom">
                            <span class="input-icon"><i class="fa-regular fa-envelope"></i></span>
                            <input type="email" id="forgotEmail" class="form-control-custom" placeholder="Enter your registered email" required>
                        </div>
                    </div>

                    <!-- Send Reset Link Button -->
                    <button type="submit" class="btn-secondary-custom w-100 justify-content-center" style="padding: 14px;">
                        <i class="fa-solid fa-paper-plane"></i> Send Reset Link
                    </button>
                </form>
            </div>

            <!-- Step 2: Reset Password Form (initially hidden) -->
            <div id="resetForm" style="display: none;">
                <div class="auth-title">
                    <div style="width: 70px; height: 70px; border-radius: 50%; background: var(--success-light); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
                        <i class="fa-solid fa-shield-halved" style="font-size: 1.6rem; color: var(--success);"></i>
                    </div>
                    <h3>Reset Password</h3>
                    <p>Create a new password for your account.</p>
                </div>

                <form onsubmit="HJKAuth.handleResetPassword(event)">
                    <!-- New Password -->
                    <div class="form-group">
                        <label class="form-label-custom" for="newPassword">New Password</label>
                        <div class="input-group-custom">
                            <span class="input-icon"><i class="fa-solid fa-lock"></i></span>
                            <input type="password" id="newPassword" class="form-control-custom" placeholder="Enter new password" required>
                            <button type="button" class="toggle-password" onclick="HJKAuth.togglePassword('newPassword')">
                                <i class="fa-regular fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Confirm New Password -->
                    <div class="form-group">
                        <label class="form-label-custom" for="confirmNewPassword">Confirm New Password</label>
                        <div class="input-group-custom">
                            <span class="input-icon"><i class="fa-solid fa-lock"></i></span>
                            <input type="password" id="confirmNewPassword" class="form-control-custom" placeholder="Confirm new password" required>
                            <button type="button" class="toggle-password" onclick="HJKAuth.togglePassword('confirmNewPassword')">
                                <i class="fa-regular fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Reset Password Button -->
                    <button type="submit" class="btn-secondary-custom w-100 justify-content-center" style="padding: 14px;">
                        <i class="fa-solid fa-check-circle"></i> Reset Password
                    </button>
                </form>
            </div>

            <!-- Back to Login -->
            <div class="auth-footer">
                <a href="login.html"><i class="fa-solid fa-arrow-left"></i> Back to Login</a>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Bootstrap 5.3 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="assets/js/data.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/components.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/auth.js"></script>
</body>
</html>
