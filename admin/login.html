<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - HJKCollections</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="../assets/css/style.css" rel="stylesheet">
    <link href="../assets/css/components.css" rel="stylesheet">
</head>
<body style="background:var(--bg-secondary)">
    <div class="auth-page" style="min-height:100vh;display:flex;align-items:center;justify-content:center">
        <div class="auth-card" style="max-width:420px;width:100%;margin:20px;background:#fff;border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);padding:40px">
            <div class="text-center mb-4">
                <div style="width:60px;height:60px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
                    <i class="fa-solid fa-shield-halved" style="font-size:24px;color:var(--secondary)"></i>
                </div>
                <h3 class="font-heading" style="color:var(--primary)">Admin Login</h3>
                <p class="text-muted" style="font-size:0.88rem">HJKCollections Admin Panel</p>
            </div>

            <form onsubmit="handleAdminLogin(event)">
                <div class="mb-3">
                    <label class="form-label-custom">Email Address</label>
                    <div style="position:relative">
                        <i class="fa-solid fa-envelope" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted)"></i>
                        <input type="email" class="form-control-custom" id="adminEmail" required placeholder="admin@hjkcollections.com" style="padding-left:40px" value="admin@hjkcollections.com">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label-custom">Password</label>
                    <div style="position:relative">
                        <i class="fa-solid fa-lock" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted)"></i>
                        <input type="password" class="form-control-custom" id="adminPassword" required placeholder="Enter password" style="padding-left:40px" value="admin123">
                        <button type="button" onclick="togglePass()" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted)"><i class="fa-solid fa-eye" id="passIcon"></i></button>
                    </div>
                </div>
                <button type="submit" class="btn-primary-custom w-100 mt-2" style="padding:12px"><i class="fa-solid fa-right-to-bracket me-2"></i>Login to Dashboard</button>
            </form>

            <div class="text-center mt-4" style="font-size:0.82rem;color:var(--text-muted)">
                <p class="mb-1">Demo Credentials:</p>
                <code style="font-size:0.8rem">admin@hjkcollections.com / admin123</code>
            </div>

            <div class="text-center mt-3">
                <a href="../index.html" style="font-size:0.85rem;color:var(--secondary)"><i class="fa-solid fa-arrow-left me-1"></i>Back to Store</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/components.js"></script>
    <script src="../assets/js/app.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', async () => {
        try {
            const res = await HJKAPI.auth.session();
            if (res.success && res.data.loggedIn && res.data.user.role === 'superadmin') {
                window.location.href = 'index.html';
            }
        } catch (e) {}
    });

    async function handleAdminLogin(e) {
        e.preventDefault();
        const email = document.getElementById('adminEmail').value.trim();
        const password = document.getElementById('adminPassword').value;
        const btn = e.target.querySelector('button[type="submit"]');
        if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Logging in...'; }

        try {
            const res = await HJKAPI.auth.adminLogin(email, password);
            if (res.success) {
                HJKComponents.showToast('Welcome back!', 'success');
                setTimeout(() => { window.location.href = 'index.html'; }, 500);
            } else {
                HJKComponents.showToast(res.message || 'Invalid admin credentials', 'error');
                if (btn) { btn.disabled = false; btn.innerHTML = 'Sign In'; }
            }
        } catch (err) {
            HJKComponents.showToast(err.message || 'Invalid admin credentials', 'error');
            if (btn) { btn.disabled = false; btn.innerHTML = 'Sign In'; }
        }
    }

    function togglePass() {
        const inp = document.getElementById('adminPassword');
        const icon = document.getElementById('passIcon');
        if (inp.type === 'password') { inp.type = 'text'; icon.className = 'fa-solid fa-eye-slash'; }
        else { inp.type = 'password'; icon.className = 'fa-solid fa-eye'; }
    }
    </script>
</body>
</html>
