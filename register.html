<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - HJKCollections</title>

    <!-- Bootstrap 5.3 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/customer.css" rel="stylesheet">
    <link href="assets/css/responsive.css">
</head>
<body>

    <div class="auth-page">
        <div class="auth-card" style="max-width: 520px;">
            <!-- Brand Logo -->
            <div class="auth-logo">
                <h2><span class="brand-hjk">HJK</span><span class="brand-collections">Collections</span></h2>
            </div>

            <!-- Title -->
            <div class="auth-title">
                <h3>Create Account</h3>
                <p>Join us and start shopping premium bags</p>
            </div>

            <!-- Register Form -->
            <form onsubmit="HJKAuth.handleRegister(event)">
                <!-- Name Row -->
                <div class="row">
                    <div class="col-6">
                        <div class="form-group">
                            <label class="form-label-custom" for="regFirstName">First Name</label>
                            <div class="input-group-custom">
                                <span class="input-icon"><i class="fa-regular fa-user"></i></span>
                                <input type="text" id="regFirstName" class="form-control-custom" placeholder="First name" required>
                            </div>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="form-group">
                            <label class="form-label-custom" for="regLastName">Last Name</label>
                            <div class="input-group-custom">
                                <span class="input-icon"><i class="fa-regular fa-user"></i></span>
                                <input type="text" id="regLastName" class="form-control-custom" placeholder="Last name" required>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label class="form-label-custom" for="regEmail">Email Address</label>
                    <div class="input-group-custom">
                        <span class="input-icon"><i class="fa-regular fa-envelope"></i></span>
                        <input type="email" id="regEmail" class="form-control-custom" placeholder="Enter your email" required>
                    </div>
                </div>

                <!-- Phone -->
                <div class="form-group">
                    <label class="form-label-custom" for="regPhone">Phone Number</label>
                    <div class="input-group-custom">
                        <span class="input-icon"><i class="fa-solid fa-phone"></i></span>
                        <input type="tel" id="regPhone" class="form-control-custom" placeholder="Enter 10-digit phone number" required>
                    </div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label class="form-label-custom" for="regPassword">Password</label>
                    <div class="input-group-custom">
                        <span class="input-icon"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" id="regPassword" class="form-control-custom" placeholder="Create a password" required
                               oninput="HJKAuth.updatePasswordStrength(this.value)">
                        <button type="button" class="toggle-password" onclick="HJKAuth.togglePassword('regPassword')">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                    <!-- Password Strength Meter -->
                    <div class="password-strength-bar">
                        <div class="bar" style="width: 0%;"></div>
                    </div>
                    <div class="password-strength-label"></div>
                </div>

                <!-- Confirm Password -->
                <div class="form-group">
                    <label class="form-label-custom" for="regConfirmPassword">Confirm Password</label>
                    <div class="input-group-custom">
                        <span class="input-icon"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" id="regConfirmPassword" class="form-control-custom" placeholder="Confirm your password" required>
                        <button type="button" class="toggle-password" onclick="HJKAuth.togglePassword('regConfirmPassword')">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- Terms -->
                <div class="form-group">
                    <div class="form-check-custom">
                        <input type="checkbox" id="regTerms">
                        <label for="regTerms" style="font-size: 0.88rem; cursor: pointer;">
                            I agree to the <a href="#" style="font-weight: 600;">Terms & Conditions</a>
                        </label>
                    </div>
                </div>

                <!-- Register Button -->
                <button type="submit" class="btn-secondary-custom w-100 justify-content-center" style="padding: 14px;">
                    <i class="fa-solid fa-user-plus"></i> Create Account
                </button>
            </form>

            <!-- Divider -->
            <div class="divider-text my-4">or</div>

            <!-- Google Signup -->
            <button type="button" class="btn-outline-custom w-100 justify-content-center" style="padding: 14px;" onclick="HJKComponents.showToast('Google signup is not available in demo mode', 'info')">
                <i class="fa-brands fa-google" style="color: #DB4437;"></i> Sign up with Google
            </button>

            <!-- Footer -->
            <div class="auth-footer">
                Already have an account? <a href="login.html">Login</a>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Bootstrap 5.3 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="assets/js/data.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/components.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/auth.js"></script>
</body>
</html>
