<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed - HJKCollections</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
    <link href="assets/css/components.css" rel="stylesheet">
    <link href="assets/css/customer.css" rel="stylesheet">
    <link href="assets/css/responsive.css" rel="stylesheet">
</head>
<body>
    <div id="announcement-bar"></div>
    <header id="header"></header>

    <div class="container-custom">
        <div class="confirmation-page" id="confirmationContent"></div>
    </div>

    <footer id="footer"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/components.js"></script>
    <script src="assets/js/app.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        setTimeout(async () => {
            const orderId = HJKUtils.getUrlParam('orderId');
            const container = document.getElementById('confirmationContent');
            let order = null;
            try {
                const res = await HJKAPI.orders.detail(orderId);
                if (res.success) order = res.data;
            } catch (e) {}

            if (!order) {
                container.innerHTML = HJKComponents.renderEmptyState('fa-circle-question', 'Order Not Found', 'We couldn\'t find this order.', 'Go Home', 'index.html');
                return;
            }

            container.innerHTML = `
                <div class="confirmation-icon"><i class="fa-solid fa-check"></i></div>
                <h2 class="font-heading mb-2">Thank You for Your Order!</h2>
                <p style="font-size:1.05rem;color:var(--text-muted)">Your order has been placed successfully.</p>

                <div class="card-custom p-4 mt-4 text-start" style="max-width:600px;margin:0 auto">
                    <div class="d-flex justify-content-between mb-3">
                        <div><span class="text-muted">Order Number</span><br><strong>${order.orderNumber}</strong></div>
                        <div class="text-end"><span class="text-muted">Date</span><br><strong>${HJKUtils.formatDate(order.createdAt)}</strong></div>
                    </div>
                    <hr>
                    ${order.items.map(item => `
                        <div class="d-flex gap-3 mb-3">
                            <img src="${item.image}" style="width:50px;height:50px;object-fit:cover;border-radius:6px">
                            <div class="flex-grow-1">
                                <div style="font-weight:600;font-size:0.88rem">${item.productName}</div>
                                <div style="font-size:0.78rem;color:var(--text-muted)">${item.color} | ${item.size} x ${item.quantity}</div>
                            </div>
                            <div style="font-weight:600">${HJKUtils.formatPrice(item.totalPrice)}</div>
                        </div>
                    `).join('')}
                    <hr>
                    <div class="d-flex justify-content-between mb-1"><span>Subtotal</span><span>${HJKUtils.formatPrice(order.subtotal)}</span></div>
                    ${order.discount > 0 ? `<div class="d-flex justify-content-between mb-1" style="color:var(--success)"><span>Discount</span><span>-${HJKUtils.formatPrice(order.discount)}</span></div>` : ''}
                    <div class="d-flex justify-content-between mb-1"><span>Shipping</span><span>${order.shippingCost === 0 ? '<span style="color:var(--success)">FREE</span>' : HJKUtils.formatPrice(order.shippingCost)}</span></div>
                    <div class="d-flex justify-content-between fw-700 mt-2 pt-2" style="border-top:2px solid var(--border);font-size:1.1rem"><span>Total Paid</span><span>${HJKUtils.formatPrice(order.totalAmount)}</span></div>
                </div>

                <div class="card-custom p-4 mt-3 text-start" style="max-width:600px;margin:0 auto">
                    <h6 class="font-heading mb-2">Shipping Address</h6>
                    <p class="mb-1" style="font-weight:600">${order.shippingAddress.fullName}</p>
                    <p class="mb-1 text-muted" style="font-size:0.88rem">${order.shippingAddress.addressLine1}${order.shippingAddress.addressLine2 ? ', ' + order.shippingAddress.addressLine2 : ''}</p>
                    <p class="mb-0 text-muted" style="font-size:0.88rem">${order.shippingAddress.city}, ${order.shippingAddress.state} - ${order.shippingAddress.pincode}</p>
                    ${order.estimatedDelivery ? `<p class="mt-2 mb-0" style="font-size:0.85rem"><i class="fa-solid fa-truck me-1 text-secondary"></i>Estimated delivery by <strong>${HJKUtils.formatDate(order.estimatedDelivery)}</strong></p>` : ''}
                </div>

                <div class="alert mt-4 p-3" style="background:var(--success-light);border:1px solid var(--success);border-radius:var(--radius-md);max-width:600px;margin:20px auto">
                    <p class="mb-0" style="font-size:0.88rem;color:var(--success)"><i class="fa-solid fa-envelope me-2"></i>A confirmation email has been sent to your email address and to the store admin.</p>
                </div>

                <div class="d-flex gap-3 justify-content-center mt-4">
                    <a href="products.html" class="btn-outline-custom">Continue Shopping</a>
                    <a href="profile/orders.html" class="btn-primary-custom">View My Orders</a>
                    <button class="btn-outline-secondary" onclick="window.print()"><i class="fa-solid fa-print"></i> Print</button>
                </div>
            `;
        }, 100);
    });
    </script>
</body>
</html>
