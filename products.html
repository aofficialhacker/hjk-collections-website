<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - HJKCollections</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
    <link href="assets/css/components.css" rel="stylesheet">
    <link href="assets/css/customer.css" rel="stylesheet">
    <link href="assets/css/responsive.css" rel="stylesheet">
</head>
<body>
    <div id="announcement-bar"></div>
    <header id="header"></header>

    <div class="container-custom">
        <div id="breadcrumbContainer"></div>

        <div class="d-flex gap-4">
            <!-- Filter Sidebar -->
            <aside class="filter-sidebar d-none d-lg-block" id="filterSidebar"></aside>

            <!-- Main Content -->
            <div class="flex-grow-1">
                <!-- Toolbar -->
                <div class="products-toolbar">
                    <span class="result-count" id="resultCount">Showing products</span>
                    <div class="toolbar-actions">
                        <button class="btn-outline-custom btn-sm d-lg-none" id="filterToggleBtn">
                            <i class="fa-solid fa-filter"></i> Filters
                        </button>
                        <select class="sort-select" id="sortSelect">
                            <option value="newest">Newest First</option>
                            <option value="price_asc">Price: Low to High</option>
                            <option value="price_desc">Price: High to Low</option>
                            <option value="popularity">Popularity</option>
                            <option value="rating">Top Rated</option>
                        </select>
                        <div class="view-toggle d-none d-md-flex">
                            <button class="active" data-view="grid" title="Grid View"><i class="fa-solid fa-grid-2"></i></button>
                            <button data-view="list" title="List View"><i class="fa-solid fa-list"></i></button>
                        </div>
                    </div>
                </div>

                <!-- Products Grid -->
                <div class="products-grid" id="productsGrid"></div>

                <!-- Pagination -->
                <div id="productsPagination"></div>
            </div>
        </div>
    </div>

    <footer id="footer"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/components.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/products.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
            // Set breadcrumb
            const bc = document.getElementById('breadcrumbContainer');
            if (bc) {
                const cat = HJKUtils.getUrlParam('category');
                const search = HJKUtils.getUrlParam('search');
                let label = 'Shop';
                if (cat) {
                    const categories = HJKUtils.store.get('hjk_categories') || [];
                    const found = categories.find(c => c.slug === cat);
                    if (found) label = found.name;
                } else if (search) {
                    label = 'Search: "' + search + '"';
                }
                bc.innerHTML = HJKComponents.renderBreadcrumbs([{label: label}]);
            }
        }, 100);
    });
    </script>
</body>
</html>
