<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - HJKCollections</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
    <link href="assets/css/components.css" rel="stylesheet">
    <link href="assets/css/customer.css" rel="stylesheet">
    <link href="assets/css/responsive.css" rel="stylesheet">
</head>
<body>
    <div id="announcement-bar"></div>
    <header id="header"></header>

    <div class="container-custom" style="padding-top:20px;padding-bottom:60px">
        <div id="breadcrumbContainer"></div>
        <div class="checkout-steps" id="checkoutSteps"></div>
        <div class="row g-4">
            <div class="col-lg-8">
                <div id="addressSection"></div>
            </div>
            <div class="col-lg-4" id="orderSummary"></div>
        </div>
    </div>

    <footer id="footer"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/components.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/checkout.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
            const bc = document.getElementById('breadcrumbContainer');
            if (bc) bc.innerHTML = HJKComponents.renderBreadcrumbs([{label:'Cart',url:'cart.html'},{label:'Checkout'}]);
        }, 100);
    });
    </script>
</body>
</html>
