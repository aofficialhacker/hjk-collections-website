<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - HJKCollections</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
    <link href="assets/css/components.css" rel="stylesheet">
    <link href="assets/css/customer.css" rel="stylesheet">
    <link href="assets/css/responsive.css" rel="stylesheet">
</head>
<body>
    <header id="header"></header>

    <div class="container-custom">
        <div class="breadcrumbs mb-4" id="breadcrumbs"></div>
        <div id="pageContent"></div>
    </div>

    <footer id="footer"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/components.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
            document.getElementById('breadcrumbs').innerHTML = HJKComponents.renderBreadcrumbs([
                { label: 'Home', url: 'index.html' },
                { label: 'Contact Us' }
            ]);

            const settings = HJKUtils.store.get('hjk_settings') || {};

            document.getElementById('pageContent').innerHTML = `
                <div class="content-card">
                    <div class="text-center mb-5">
                        <h1 class="font-heading" style="font-size:2.2rem;color:var(--primary)">Contact Us</h1>
                        <p class="text-muted" style="max-width:600px;margin:0 auto">Have a question or feedback? We'd love to hear from you.</p>
                    </div>

                    <div class="row g-4 mb-5">
                        <div class="col-md-4">
                            <div class="contact-info-card text-center" style="padding:30px;background:var(--bg-light);border-radius:var(--radius-lg)">
                                <div style="width:60px;height:60px;border-radius:50%;background:var(--primary-light);display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
                                    <i class="fa-solid fa-location-dot" style="font-size:24px;color:var(--primary)"></i>
                                </div>
                                <h6 class="font-heading mb-2">Our Address</h6>
                                <p class="text-muted mb-0" style="font-size:0.88rem">${settings.address || '123 Fashion Street, Mumbai, Maharashtra 400001, India'}</p>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="contact-info-card text-center" style="padding:30px;background:var(--bg-light);border-radius:var(--radius-lg)">
                                <div style="width:60px;height:60px;border-radius:50%;background:var(--primary-light);display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
                                    <i class="fa-solid fa-phone" style="font-size:24px;color:var(--primary)"></i>
                                </div>
                                <h6 class="font-heading mb-2">Phone</h6>
                                <p class="text-muted mb-0" style="font-size:0.88rem">${settings.phone || '+91 98765 43210'}<br>${settings.whatsapp ? 'WhatsApp: ' + settings.whatsapp : ''}</p>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="contact-info-card text-center" style="padding:30px;background:var(--bg-light);border-radius:var(--radius-lg)">
                                <div style="width:60px;height:60px;border-radius:50%;background:var(--primary-light);display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
                                    <i class="fa-solid fa-envelope" style="font-size:24px;color:var(--primary)"></i>
                                </div>
                                <h6 class="font-heading mb-2">Email</h6>
                                <p class="text-muted mb-0" style="font-size:0.88rem">${settings.email || 'info@hjkcollections.com'}<br>support@hjkcollections.com</p>
                            </div>
                        </div>
                    </div>

                    <div class="row g-5">
                        <div class="col-md-7">
                            <h3 class="font-heading mb-4">Send us a Message</h3>
                            <form onsubmit="handleContactForm(event)">
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label-custom">Full Name *</label>
                                        <input type="text" class="form-control-custom" id="contactName" required placeholder="Your name">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label-custom">Email *</label>
                                        <input type="email" class="form-control-custom" id="contactEmail" required placeholder="your@email.com">
                                    </div>
                                </div>
                                <div class="mt-3">
                                    <label class="form-label-custom">Phone</label>
                                    <input type="tel" class="form-control-custom" id="contactPhone" placeholder="Your phone number">
                                </div>
                                <div class="mt-3">
                                    <label class="form-label-custom">Subject *</label>
                                    <select class="form-control-custom" id="contactSubject" required>
                                        <option value="">Select a topic</option>
                                        <option value="general">General Inquiry</option>
                                        <option value="order">Order Related</option>
                                        <option value="product">Product Question</option>
                                        <option value="return">Return / Exchange</option>
                                        <option value="feedback">Feedback</option>
                                        <option value="other">Other</option>
                                    </select>
                                </div>
                                <div class="mt-3">
                                    <label class="form-label-custom">Message *</label>
                                    <textarea class="form-control-custom" id="contactMessage" rows="5" required placeholder="Write your message here..."></textarea>
                                </div>
                                <button type="submit" class="btn-primary-custom mt-3"><i class="fa-solid fa-paper-plane"></i> Send Message</button>
                            </form>
                        </div>
                        <div class="col-md-5">
                            <h3 class="font-heading mb-4">Find Us</h3>
                            <div style="border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-sm)">
                                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d241317.11609823277!2d72.74109995709657!3d19.08219783958821!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3be7c6306644edc1%3A0x5da4ed8f8d648c69!2sMumbai%2C%20Maharashtra!5e0!3m2!1sen!2sin!4v1705324800000!5m2!1sen!2sin" width="100%" height="350" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                            </div>
                            <div class="mt-4">
                                <h6 class="font-heading mb-2">Business Hours</h6>
                                <div class="d-flex justify-content-between mb-1" style="font-size:0.88rem"><span>Monday - Friday</span><span>9:00 AM - 8:00 PM</span></div>
                                <div class="d-flex justify-content-between mb-1" style="font-size:0.88rem"><span>Saturday</span><span>10:00 AM - 6:00 PM</span></div>
                                <div class="d-flex justify-content-between" style="font-size:0.88rem"><span>Sunday</span><span>Closed</span></div>
                            </div>
                        </div>
                    </div>
                </div>`;
        }, 100);
    });

    function handleContactForm(e) {
        e.preventDefault();
        const name = document.getElementById('contactName').value.trim();
        const email = document.getElementById('contactEmail').value.trim();
        const subject = document.getElementById('contactSubject').value;
        const message = document.getElementById('contactMessage').value.trim();

        if (!name || !email || !subject || !message) {
            HJKComponents.showToast('Please fill in all required fields', 'error');
            return;
        }

        HJKComponents.showToast('Message sent successfully! We will get back to you soon.', 'success');
        e.target.reset();
    }
    </script>
</body>
</html>
